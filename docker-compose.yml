services:
  sirrd:
    build: .
    ports:
      - "7843:7843"
    volumes:
      - sirr-data:/data
    environment:
      SIRR_DATA_DIR: /data
    restart: unless-stopped
    # Admin commands: docker exec mysirrd /sirrd keys create alice
    # The admin socket is inside the container at /data/sirrd.sock

volumes:
  sirr-data:
