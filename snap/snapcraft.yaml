name: sirrd
base: core22
version: "1.0.0"  # updated by CI
summary: Ephemeral secret vault — burn-after-read secrets for developers
description: |
  Sirr is a self-hosted ephemeral secret vault. Store secrets that automatically
  expire after a set number of reads or a TTL. Encrypted at rest with
  ChaCha20-Poly1305.

  Run `sirrd serve` to start the server, or use the `sirr` CLI to push and
  pull secrets.

  Documentation: https://sirrlock.com/docs
license: BUSL-1.1
grade: stable
confinement: strict

architectures:
  - build-on: [amd64]
    build-for: [amd64]
  - build-on: [arm64]
    build-for: [arm64]

parts:
  sirrd:
    plugin: dump
    source: https://github.com/sirrlock/sirr/releases/download/v${SNAPCRAFT_PROJECT_VERSION}/sirrd-linux-x64.tar.gz
    source-type: tar
    override-pull: |
      ARCH=$(dpkg --print-architecture)
      case "$ARCH" in
        amd64) FRIENDLY="linux-x64" ;;
        arm64) FRIENDLY="linux-arm64" ;;
        *)     echo "Unsupported: $ARCH"; exit 1 ;;
      esac
      curl -fsSL "https://github.com/sirrlock/sirr/releases/download/v${SNAPCRAFT_PROJECT_VERSION}/sirrd-${FRIENDLY}.tar.gz" \
        | tar xzf - -C "$SNAPCRAFT_PART_SRC"
    organize:
      sirrd: bin/sirrd

  sirr:
    plugin: dump
    source: https://github.com/sirrlock/sirr/releases/download/v${SNAPCRAFT_PROJECT_VERSION}/sirr-linux-x64.tar.gz
    source-type: tar
    override-pull: |
      ARCH=$(dpkg --print-architecture)
      case "$ARCH" in
        amd64) FRIENDLY="linux-x64" ;;
        arm64) FRIENDLY="linux-arm64" ;;
        *)     echo "Unsupported: $ARCH"; exit 1 ;;
      esac
      curl -fsSL "https://github.com/sirrlock/sirr/releases/download/v${SNAPCRAFT_PROJECT_VERSION}/sirr-${FRIENDLY}.tar.gz" \
        | tar xzf - -C "$SNAPCRAFT_PART_SRC"
    organize:
      sirr: bin/sirr

apps:
  sirrd:
    command: bin/sirrd
    plugs:
      - network
      - network-bind
      - home
  sirr:
    command: bin/sirr
    plugs:
      - network
      - home
